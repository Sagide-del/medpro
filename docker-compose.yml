# Self-hosted deploy (VPS, Render/Railway "Docker" service, Fly.io, etc).
# For a fresh environment:
#   docker compose up -d --build
#   docker compose exec server npm run migrate            # schema + all 3 migrations
#   docker compose exec server npm run migrate -- --seed  # optional: also load demo data
# (see README "Deploying to production" for why the files must run in that order)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database:/migrations:ro
    ports:
      - '5432:5432'

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/medpro
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:?set a long random JWT_SECRET in your .env before deploying}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      MPESA_ENV: ${MPESA_ENV:-sandbox}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-your_consumer_key}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-your_consumer_secret}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-your_passkey}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # This compose Postgres has no TLS listener — do not set DB_SSL=true here.
      DB_SSL: 'false'
      # Uploads default to the local volume below. Set these three (plus real
      # AWS credentials as host env vars) to use S3 instead — see server/.env.example.
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_PUBLIC_URL: ${AWS_S3_PUBLIC_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  db_data:
  uploads:
